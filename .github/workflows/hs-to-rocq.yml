name: hs-to-rocq

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  LANG: C.utf8

jobs:

  hlint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up HLint
        uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.6.1'
      - name: Run HLint
        uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/lib", "src/exe"]'
          fail-on: suggestion

  build-haskell:
    name: Build hs-to-rocq (GHC 9.10)
    runs-on: ubuntu-latest
    container:
      image: haskell:9.10.3
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - name: Fix Docker config permissions
        run: mkdir -p /root/.docker && echo '{}' > /root/.docker/config.json
      - name: Caching Stack
        uses: actions/cache@v4
        with:
          path: |
            /root/.stack
            .stack-work
          key: stack-ghc9.10.3-${{ hashFiles('hs-to-rocq.cabal', 'stack.yaml', 'src/**') }}
      - name: Build hs-to-rocq
        run: stack --no-terminal --system-ghc --allow-different-user build

  test-coq-files:
    name: Testing all Coq examples (Coq 8.20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: coq-community/docker-coq-action@v1
        with:
          custom_image: 'mathcomp/mathcomp:2.5.0-coq-8.20'
          before_script: |
            startGroup "Workaround permission issue"
            sudo chown -R coq:coq .
            endGroup
            startGroup "Install coq-equations (needed by graph theories)"
            opam install -y coq-equations.1.3.1+8.20
            endGroup
          script: |
            startGroup "Lint opam files"
            opam lint base/coq-hs-to-rocq-base.opam
            opam lint base-thy/coq-hs-to-rocq-base-thy.opam
            opam lint examples/containers/coq-hs-to-rocq-containers.opam
            endGroup
            startGroup "Compiling base"
            (cd base; coq_makefile -f _CoqProject -o Makefile)
            make -j -C base
            (cd base-thy; coq_makefile -f _CoqProject -o Makefile)
            make -j -C base-thy
            endGroup
            startGroup "Compiling containers"
            (cd examples/containers/lib; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/containers/lib
            (cd examples/containers/theories; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/containers/theories
            endGroup
            startGroup "Compiling transformers"
            (cd examples/transformers/lib; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/transformers/lib
            endGroup
            startGroup "Compiling graph"
            (cd examples/graph/lib; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/graph/lib
            (cd examples/graph/theories; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/graph/theories
            endGroup
            startGroup "Compiling GHC core"
            (cd examples/ghc/lib; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/ghc/lib
            (cd examples/ghc/theories; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/ghc/theories
            endGroup
            startGroup "Compiling core-semantics"
            (cd examples/core-semantics/lib; coq_makefile -f _CoqProject -o Makefile)
            make -j -C examples/core-semantics/lib
            endGroup
            startGroup "Compiling resources"
            coqc -Q base "" examples/resources/list_monad.v
            endGroup

  tests:
    name: Unit tests and examples
    runs-on: ubuntu-latest
    needs: build-haskell
    container:
      image: haskell:9.10.3
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - name: Fix Docker config permissions
        run: mkdir -p /root/.docker && echo '{}' > /root/.docker/config.json
      - name: Caching Stack
        uses: actions/cache@v4
        with:
          path: |
            /root/.stack
            .stack-work
          key: stack-ghc9.10.3-${{ hashFiles('hs-to-rocq.cabal', 'stack.yaml', 'src/**') }}
      - name: Build hs-to-rocq
        run: stack --no-terminal --system-ghc --allow-different-user build
      - name: Set up Coq
        run: |
          set -x
          apt-get update
          apt-get install -y opam libgmp-dev m4 pkg-config
          opam --version
          opam init -j 2 -n -y --disable-sandboxing -c ocaml-base-compiler.4.14.2
          eval $(opam env)
          opam repo add coq-released https://coq.inria.fr/opam/released
          # Only install coq + equations (not coq-mathcomp-ssreflect) to avoid
          # rocq-elpi build failures. mathcomp is tested in test-coq-files.
          opam install -y coq.8.20.1 coq-equations.1.3.1+8.20
      - name: Build base
        run: |
          eval $(opam env)
          (cd base; coq_makefile -f _CoqProject -o Makefile)
          make -j -C base
      - name: Run unit tests
        run: |
          eval $(opam env)
          # The test Makefile uses make -k which returns exit 2 when
          # TODO_PASS tests fail as expected. This is not a real failure.
          make -C examples/tests || test $? -eq 2
      - name: Run base-tests
        run: |
          eval $(opam env)
          make -C examples/base-tests || test $? -eq 2
      - name: Build base-thy and examples
        run: |
          eval $(opam env)
          (cd base-thy; coq_makefile -f _CoqProject -o Makefile)
          make -j -C base-thy
          make -C examples/compiler
          make -C examples/rle
          make -C examples/quicksort
          make -C examples/dlist
          make -C examples/coinduction
          make -C examples/intervals
          make -C examples/successors
          make -C examples/lambda
          make -C examples/simple
          (cd examples/bag; coq_makefile -f _CoqProject -o Makefile)
          make -C examples/bag
          # resources/list_monad.v needs mathcomp; tested in test-coq-files job

  test-rocq9:
    name: Rocq 9.0 base + tests
    runs-on: ubuntu-latest
    needs: build-haskell
    container:
      image: haskell:9.10.3
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - name: Fix Docker config permissions
        run: mkdir -p /root/.docker && echo '{}' > /root/.docker/config.json
      - name: Initialize required submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init examples/ghc/ghc
      - name: Caching Stack
        uses: actions/cache@v4
        with:
          path: |
            /root/.stack
            .stack-work
          key: stack-ghc9.10.3-${{ hashFiles('hs-to-rocq.cabal', 'stack.yaml', 'src/**') }}
      - name: Build hs-to-rocq
        run: stack --no-terminal --system-ghc --allow-different-user build
      - name: Install Rocq 9.0
        run: |
          set -x
          apt-get update
          apt-get install -y opam libgmp-dev m4 pkg-config
          opam --version
          opam init -j 2 -n -y --disable-sandboxing -c ocaml-base-compiler.4.14.2
          eval $(opam env)
          opam repo add coq-released https://coq.inria.fr/opam/released
          opam install -y \
            rocq-prover.9.0.0 \
            rocq-core.9.0.0 \
            rocq-runtime.9.0.0 \
            rocq-stdlib.9.0.0 \
            rocq-equations.1.3.1+9.0
      - name: Build Rocq 9.0 base
        run: |
          eval $(opam env)
          (cd examples/rocq9.0/base; coq_makefile -f _CoqProject -o Makefile)
          make -j -C examples/rocq9.0/base
      - name: Run Rocq 9.0 unit tests
        run: |
          eval $(opam env)
          make -C examples/rocq9.0/tests || test $? -eq 2

  test-rocq9-translation:
    name: Rocq 9.0 translation (ensures convenience copy is up-to-date)
    runs-on: ubuntu-latest
    needs: build-haskell
    container:
      image: haskell:9.10.3
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - name: Fix Docker config permissions
        run: mkdir -p /root/.docker && echo '{}' > /root/.docker/config.json
      - name: Initialize required submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init examples/ghc/ghc
      - name: Caching Stack
        uses: actions/cache@v4
        with:
          path: |
            /root/.stack
            .stack-work
          key: stack-ghc9.10.3-${{ hashFiles('hs-to-rocq.cabal', 'stack.yaml', 'src/**') }}
      - name: Build hs-to-rocq
        run: stack --no-terminal --system-ghc --allow-different-user build
      - name: Regenerating Rocq 9.0 base
        run: |
          make -C examples/rocq9.0/base-src clean
          make -C examples/rocq9.0/base-src vfiles
      - name: Comparing convenience copy of Rocq 9.0 base
        run: |
          git add examples/rocq9.0/base
          git status
          git diff-index --cached --quiet HEAD -- examples/rocq9.0/base

  test-translation:
    name: Translation (ensures convenience copy is up-to-date)
    runs-on: ubuntu-latest
    needs: build-haskell
    container:
      image: haskell:9.10.3
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v4
      - name: Fix Docker config permissions
        run: mkdir -p /root/.docker && echo '{}' > /root/.docker/config.json
      - name: Initialize required submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init examples/ghc/ghc
          git submodule update --init examples/containers/containers
          git submodule update --init --depth 1 examples/graph/graph
      - name: Installing dependencies
        run: apt-get update && apt-get install -y xutils-dev
      - name: Caching Stack
        uses: actions/cache@v4
        with:
          path: |
            /root/.stack
            .stack-work
          key: stack-ghc9.10.3-${{ hashFiles('hs-to-rocq.cabal', 'stack.yaml', 'src/**') }}
      - name: Build hs-to-rocq
        run: stack --no-terminal --system-ghc --allow-different-user build
      - name: Translating base
        run: |
          make -C examples/base-src clean
          make -C examples/base-src vfiles
      - name: Comparing convenience copy of base
        run: |
          git add base
          git status
          git diff-index --cached --quiet HEAD -- base
      - name: Translating containers
        run: make -C examples/containers vfiles
      - name: Comparing convenience copy of containers
        run: |
          git add examples/containers/lib
          git status
          git diff-index --cached --quiet HEAD -- examples/containers/lib
      - name: Translating GHC core
        run: |
          make -C examples/ghc clean
          make -C examples/ghc vfiles
      - name: Comparing convenience copy of GHC
        run: |
          git add examples/ghc/lib
          git status
          git diff-index --cached --quiet HEAD -- examples/ghc/lib
      - name: Translating graph
        run: |
          make -C examples/graph clean
          make -C examples/graph vfiles
      - name: Comparing convenience copy of graph
        run: |
          git add examples/graph/lib
          git status
          git diff-index --cached --quiet HEAD -- examples/graph/lib
